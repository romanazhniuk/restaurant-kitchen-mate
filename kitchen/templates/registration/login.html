{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log in — KitchenMate{% endblock %}

{% block content %}
  <h2>Log in</h2>
  <form method="post" action="{% url 'kitchen:login' %}">
    {% csrf_token %}
    {{ form|crispy }}
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>
  <p class="mt-3">No account? <a href="{% url 'kitchen:register' %}">Register</a></p>
{% endblock %}
