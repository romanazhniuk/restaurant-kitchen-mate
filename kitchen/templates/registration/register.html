{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Register — KitchenMate{% endblock %}

{% block content %}
  <h2>Create account</h2>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Register</button>
  </form>
  <p class="mt-3">Already have an account? <a href="{% url 'kitchen:login' %}">Log in</a></p>
{% endblock %}
