{% extends "base.html" %}
{% load static %}

{% block title %}KitchenMate — Home{% endblock %}

{% block content %}
  <div class="text-center">
    <img src="{% static 'restaurant/img/img.png' %}" alt="Homepage banner" class="mw-100 mb-4">
    <h1 class="display-4 mb-4">Welcome to KitchenMate</h1>
    <p class="lead mb-4">Manage dishes, cooks, and dish types in your restaurant kitchen.</p>

    <div class="d-flex justify-content-center gap-3">
      <a href="{% url 'kitchen:dish-list' %}" class="btn btn-primary me-2">View dishes</a>
      <a href="{% url 'kitchen:cook-list' %}" class="btn btn-outline-secondary">View cooks</a>
    </div>
  </div>
{% endblock %}
