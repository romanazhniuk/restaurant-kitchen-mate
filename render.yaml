services:
  - type: web
    plan: free
    name: restaurant-kitchen-mate
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn restaurant_kitchen_mate.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
